<!DOCTYPE html> 
<html>
	<head> 
		<meta charset="UTF-8"> 
		<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css"> 
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
	</head> 
<body class="p-4">

  <!-- Interactive Details Wrapper acts as the Controller -->
  <details class="position-relative">
    
    <!-- Summary element acts as the trigger button -->
    <summary class="btn btn-primary list-unstyled">
      Sign Up
    </summary>

    <!-- Modal Layout Wrapper -->
    <div class="position-fixed top-50 start-50 translate-middle p-3 bg-white border rounded shadow-lg" style="z-index: 1050; width: 500px; max-width: 90vw;">
      
      <!-- Modal Header -->
      <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
        <h5 class="m-0">Create Account</h5>
        <!-- Clicking this link closes the details disclosure menu naturally -->
        <a href="#" class="btn-close" aria-label="Close"></a>
      </div>
      
      <!-- Modal Body Form -->
      <form>
        <!-- Email -->
        <div class="mb-3">
          <label for="signupEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="signupEmail" placeholder="Enter email" required>
          <div id="emailHelp" class="form-text">Your information is safe with us.</div>
        </div>
        
        <!-- Password -->
        <div class="mb-3">
          <label for="signupPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="signupPassword" placeholder="Password" required>
        </div>
        
        <!-- Confirm Password -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
        </div>
        
        <!-- Action Buttons -->
        <div class="d-flex justify-content-end gap-2 pt-2 border-top">
          <a href="#" class="btn btn-secondary">Close</a>
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </form>

    </div>
  </details>

</body>
</html>
